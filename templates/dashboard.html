<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PacificTube アナリティクスダッシュボード</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="dashboard-header">
            <h1>📊 PacificTube アナリティクスダッシュボード</h1>
            <div class="header-actions">
                <a href="/dashboard" class="export-btn" style="background: #8b5cf6; text-decoration: none;">⬅️ 期間選択に戻る</a>
                <button class="export-btn" onclick="exportData()">📥 Excel エクスポート</button>
                <a href="/" class="home-btn">🏠 ホームに戻る</a>
            </div>
        </header>

        <!-- Time Period Selector -->
        <div class="time-period-selector">
            <div class="period-card {% if period == '7d' %}active{% endif %}" onclick="changePeriod('7d')">
                <div class="period-label">過去7日間</div>
                <div class="period-icon">📅</div>
            </div>
            <div class="period-card {% if period == '30d' %}active{% endif %}" onclick="changePeriod('30d')">
                <div class="period-label">過去30日間</div>
                <div class="period-icon">📆</div>
            </div>
            <div class="period-card {% if period == '90d' %}active{% endif %}" onclick="changePeriod('90d')">
                <div class="period-label">過去90日間</div>
                <div class="period-icon">📊</div>
            </div>
        </div>

        <!-- Metrics Cards Grid -->
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-icon">📈</div>
                <div class="metric-content">
                    <div class="metric-label">合計イベント</div>
                    <div class="metric-value" id="totalEvents">-</div>
                </div>
            </div>

            <div class="metric-card">
                <div class="metric-icon">👤</div>
                <div class="metric-content">
                    <div class="metric-label">ユーザーログイン</div>
                    <div class="metric-value" id="userLogins">-</div>
                </div>
            </div>

            <div class="metric-card">
                <div class="metric-icon">🎥</div>
                <div class="metric-content">
                    <div class="metric-label">動画視聴回数</div>
                    <div class="metric-value" id="videoViews">-</div>
                </div>
            </div>

            <div class="metric-card">
                <div class="metric-icon">🔍</div>
                <div class="metric-content">
                    <div class="metric-label">検索回数</div>
                    <div class="metric-value" id="searches">-</div>
                </div>
            </div>

            <div class="metric-card">
                <div class="metric-icon">💬</div>
                <div class="metric-content">
                    <div class="metric-label">コメント数</div>
                    <div class="metric-value" id="comments">-</div>
                </div>
            </div>

            <div class="metric-card">
                <div class="metric-icon">👍</div>
                <div class="metric-content">
                    <div class="metric-label">高評価</div>
                    <div class="metric-value" id="likes">-</div>
                </div>
            </div>

            <div class="metric-card">
                <div class="metric-icon">👎</div>
                <div class="metric-content">
                    <div class="metric-label">低評価</div>
                    <div class="metric-value" id="dislikes">-</div>
                </div>
            </div>

            <div class="metric-card">
                <div class="metric-icon">🎬</div>
                <div class="metric-content">
                    <div class="metric-label">ユニーク動画</div>
                    <div class="metric-value" id="uniqueVideos">-</div>
                </div>
            </div>
        </div>

        <!-- Line Chart - Daily Activity Trend -->
        <div class="chart-container">
            <h2>日単位のアクティビティトレンド</h2>
            <canvas id="trendChart"></canvas>
        </div>

        <!-- Pie Charts Row -->
        <div class="pie-charts-row">
            <div class="pie-chart-container">
                <h2>フォルダ別視聴数</h2>
                <canvas id="folderPieChart"></canvas>
            </div>

            <div class="pie-chart-container">
                <h2>人気動画トップ10</h2>
                <canvas id="videoPieChart"></canvas>
            </div>
        </div>

        <!-- Active Users Section -->
        <div class="active-users-section">
            <h2>アクティブユーザー</h2>
            <div class="users-grid" id="usersGrid">
                <!-- User cards will be populated by JavaScript -->
            </div>
        </div>

        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p>データ読み込み中...</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
    <script>
        // Initialize dashboard with current period
        const currentPeriod = '{{ period }}';
        window.onload = () => loadDashboardData(currentPeriod);
    </script>
</body>
</html>
