<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PacificTube アナリティクスダッシュボード</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Navigation Buttons -->
        <div class="navigation-buttons">
            <a href="/dashboard" class="nav-btn back-btn">⬅️ 期間選択に戻る</a>
            <a href="/" class="nav-btn home-btn">🏠 ホームに戻る</a>
        </div>

        <!-- White Content Box (like image) -->
        <div class="dashboard-content-box">
            <!-- Header Section -->
            <div class="dashboard-header-section">
                <div class="header-title">
                    <h1>🔍 ユーザーアクティビティダッシュボード</h1>
                    <div class="header-meta">
                        <span class="badge application-insights">Application Insights</span>
                        <span class="badge period-badge">過去{{ period.replace('d', '日間') }}</span>
                    </div>
                </div>
                <button class="excel-export-btn" onclick="exportData()">📥 Excelにエクスポート</button>
            </div>

            <div class="divider"></div>

            <!-- Data Period Row -->
            <div class="data-period-row">
                <span class="period-icon">📅</span>
                <span class="period-text">データ期間: <span id="dateRange">-</span> (<span id="eventCount">-</span> events)</span>
            </div>

            <!-- Metrics Cards Grid with Different Colors -->
            <div class="metrics-grid">
                <div class="metric-card green">
                    <div class="metric-content">
                        <div class="metric-label">合計イベント</div>
                        <div class="metric-value" id="totalEvents">-</div>
                    </div>
                </div>

                <div class="metric-card orange">
                    <div class="metric-content">
                        <div class="metric-label">ユーザーログイン</div>
                        <div class="metric-value" id="userLogins">-</div>
                    </div>
                </div>

                <div class="metric-card blue-gray">
                    <div class="metric-content">
                        <div class="metric-label">動画視聴回数</div>
                        <div class="metric-value" id="videoViews">-</div>
                    </div>
                </div>

                <div class="metric-card purple">
                    <div class="metric-content">
                        <div class="metric-label">検索回数</div>
                        <div class="metric-value" id="searches">-</div>
                    </div>
                </div>

                <div class="metric-card teal">
                    <div class="metric-content">
                        <div class="metric-label">コメント数</div>
                        <div class="metric-value" id="comments">-</div>
                    </div>
                </div>

                <div class="metric-card amber">
                    <div class="metric-content">
                        <div class="metric-label">高評価</div>
                        <div class="metric-value" id="likes">-</div>
                    </div>
                </div>

                <div class="metric-card cyan">
                    <div class="metric-content">
                        <div class="metric-label">低評価</div>
                        <div class="metric-value" id="dislikes">-</div>
                    </div>
                </div>

                <div class="metric-card indigo">
                    <div class="metric-content">
                        <div class="metric-label">ユニーク動画</div>
                        <div class="metric-value" id="uniqueVideos">-</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Section (outside white box) -->
        <!-- Line Chart - Daily Activity Trend -->
        <div class="chart-container">
            <h2>📊 日単位のアクティビティトレンド</h2>
            <canvas id="trendChart"></canvas>
        </div>

        <!-- Pie Charts Row -->
        <div class="pie-charts-row">
            <div class="pie-chart-container">
                <h2>📁 フォルダ別視聴数</h2>
                <canvas id="folderPieChart"></canvas>
            </div>

            <div class="pie-chart-container">
                <h2>人気動画トップ10</h2>
                <canvas id="videoPieChart"></canvas>
            </div>
        </div>

        <!-- Active Users Section -->
        <div class="active-users-section">
            <h2>アクティブユーザー</h2>
            <div class="users-grid" id="usersGrid">
                <!-- User cards will be populated by JavaScript -->
            </div>
        </div>

        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p>データ読み込み中...</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
    <script>
        // Initialize dashboard with current period
        const currentPeriod = '{{ period }}';
        window.onload = () => loadDashboardData(currentPeriod);
    </script>
</body>
</html>
