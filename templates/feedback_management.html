<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フィードバック管理 - Pacific Tube</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='feedback.css') }}">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <img src="{{ url_for('static', filename='logo.png') }}" class="logo" alt="Pacific Tube Logo">
            <h1 class="title">Pacific Tube - フィードバック管理</h1>
        </div>
        <div class="header-right">
            <a href="/" class="back-home-btn">🏠 ホームに戻る</a>
        </div>
    </header>

    <div class="feedback-mgmt-page">
        <!-- Statistics Section -->
        <div class="stats-section">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">総フィードバック数</div>
                    <div class="stat-value" id="totalFeedbackCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">平均評価</div>
                    <div class="stat-value" id="averageRating">0.0</div>
                </div>
                <div class="stat-card positive">
                    <div class="stat-label">👍 高評価</div>
                    <div class="stat-value" id="positiveCount">0</div>
                </div>
                <div class="stat-card negative">
                    <div class="stat-label">👎 低評価</div>
                    <div class="stat-value" id="negativeCount">0</div>
                </div>
                <div class="stat-card detailed">
                    <div class="stat-label">詳細</div>
                    <div class="stat-value" id="detailedCount">0</div>
                </div>
            </div>
        </div>

        <!-- Feedback List -->
        <div class="feedback-list-section">
            <div class="feedback-list-header">
                <button class="export-btn" onclick="exportFeedbackToExcel()">
                    📥 Excelにエクスポート
                </button>
            </div>
            
            <div class="feedback-filters">
                <input type="text" id="searchBox" class="search-box" placeholder="🔍 検索......." onkeyup="filterFeedback()">
                
                <select id="filterStatus" class="filter-select" onchange="filterFeedback()">
                    <option value="">ステータス: 全て</option>
                    <option value="new">新規</option>
                    <option value="reviewed">確認済み</option>
                    <option value="resolved">解決済み</option>
                </select>
                
                <select id="filterImportance" class="filter-select" onchange="filterFeedback()">
                    <option value="">重要度: 全て</option>
                    <option value="緊急">緊急</option>
                    <option value="高">高</option>
                    <option value="中">中</option>
                    <option value="低">低</option>
                </select>
                
                <select id="filterCategory" class="filter-select" onchange="filterFeedback()">
                    <option value="">カテゴリー: 全て</option>
                    <option value="動画再生問題">動画再生問題</option>
                    <option value="検索機能">検索機能</option>
                    <option value="字幕/音声">字幕/音声</option>
                    <option value="パフォーマンス/速度">パフォーマンス/速度</option>
                    <option value="機能追加要望">機能追加要望</option>
                    <option value="その他">その他</option>
                </select>
                
                <button class="reset-btn" onclick="resetFilters()">リセット</button>
            </div>
            
            <div class="feedback-table-container">
                <table class="feedback-table" id="feedbackTable">
                    <thead>
                        <tr>
                            <th>NO.</th>
                            <th>日時</th>
                            <th>カテゴリー</th>
                            <th>重要度</th>
                            <th>評価</th>
                            <th>総合評価</th>
                            <th>フィードバック内容</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="feedbackTableBody">
                        <tr>
                            <td colspan="8" class="no-data">データがありません</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Feedback Detail Modal -->
    <div class="feedback-detail-modal" id="feedbackDetailModal" style="display: none;">
        <div class="feedback-detail-content">
            <div class="feedback-detail-header">
                <h2>フィードバック詳細</h2>
            </div>
            <div class="feedback-detail-body">
                <div class="detail-section">
                    <label class="detail-label">詳細フィードバック</label>
                    <div class="feedback-detail-text" id="detailFeedbackText"></div>
                </div>

                <div class="detail-section">
                    <label class="detail-label">ステータス</label>
                    <select id="detailStatus" class="detail-select">
                        <option value="new">新規</option>
                        <option value="reviewed">確認済み</option>
                        <option value="resolved">解決済み</option>
                    </select>
                </div>

                <div class="detail-section">
                    <label class="detail-label">管理者メモ</label>
                    <textarea id="detailAdminMemo" class="detail-textarea" rows="4" placeholder="管理者向けのメモを入力してください..."></textarea>
                </div>

                <div class="detail-footer">
                    <button class="btn-close" onclick="closeDetailModal()">閉じる</button>
                    <button class="btn-update" onclick="updateFeedbackDetail()">更新</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='feedback.js') }}"></script>
    <script>
        // Load feedback data on page load
        document.addEventListener('DOMContentLoaded', async function() {
            await loadFeedbackDataForPage();
        });
    </script>
</body>
</html>
