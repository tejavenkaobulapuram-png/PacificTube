<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacific Tube - 社内動画ライブラリ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z" />
            </svg>
            <h1 class="title">Pacific Tube</h1>
        </div>
        <div class="header-center">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-box" placeholder="動画を検索...">
                <button class="search-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="header-right">
            <span class="subtitle">社内動画ライブラリ</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <a href="#" class="nav-item active" onclick="showAllVideos(event)">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                        </svg>
                        <span>ホーム</span>
                    </a>
                </div>
                
                <div class="nav-divider"></div>
                
                <div class="nav-section">
                    <h3 class="nav-title">フォルダ</h3>
                    <div id="folderTree" class="folder-tree">
                        <div class="loading-folders">読み込み中...</div>
                    </div>
                </div>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <div class="content-area">
            <div class="container">
        <!-- Loading State -->
        <div id="loading" class="loading-container">
            <div class="spinner"></div>
            <p>動画を読み込んでいます...</p>
        </div>

        <!-- Error State -->
        <div id="error" class="error-message" style="display: none;">
            <span id="errorText"></span>
            <button onclick="loadVideos()" class="retry-button">再試行</button>
        </div>

        <!-- Empty State -->
        <div id="empty" class="info-message" style="display: none;">
            ℹ️ 動画が見つかりませんでした。Azure Blob Storageに動画ファイルをアップロードしてください。
        </div>

        <!-- Video Grid -->
        <div id="videoGrid" class="video-grid"></div>
            </div>
        </div>
    </main>

    <!-- Video Player Modal -->
    <div id="videoModal" class="video-modal" style="display: none;">
        <div class="video-modal-content">
            <div class="video-modal-header">
                <h2 id="modalTitle"></h2>
                <button class="close-button" onclick="closeModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
                    </svg>
                </button>
            </div>
            <div class="video-modal-player">
                <video id="videoPlayer" controls autoplay></video>
            </div>
            <div class="video-modal-info">
                <div class="info-row">
                    <svg class="info-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10z" />
                    </svg>
                    <span id="modalDate"></span>
                </div>
                <div class="info-row">
                    <svg class="info-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z" />
                    </svg>
                    <span id="modalSize"></span>
                </div>
            </div>

            <!-- Engagement Section (Like, Dislike, Share, Comments) -->
            <div class="video-modal-engagement">
                <!-- Action Buttons -->
                <div class="engagement-actions">
                    <button class="engagement-btn" id="likeBtn" onclick="handleLike()">
                        <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/>
                        </svg>
                        <span id="likeCount">0</span>
                    </button>
                    <button class="engagement-btn" id="dislikeBtn" onclick="handleDislike()">
                        <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z"/>
                        </svg>
                        <span id="dislikeCount">0</span>
                    </button>
                    <button class="engagement-btn" onclick="handleShare()">
                        <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/>
                        </svg>
                        <span>Share</span>
                    </button>
                    <button class="engagement-btn" onclick="handleDownload()">
                        <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                        </svg>
                        <span>Download</span>
                    </button>
                </div>

                <!-- Comments Section -->
                <div class="comments-section">
                    <div class="comments-header">
                        <h3><span id="commentsCount"></span> Comments</h3>
                    </div>
                    
                    <!-- Add Comment Form -->
                    <div class="add-comment-form">
                        <input type="text" id="authorName" placeholder="Your name (optional)" maxlength="50">
                        <textarea id="commentText" placeholder="Add a comment..." maxlength="1000" rows="2"></textarea>
                        <button class="submit-comment-btn" onclick="submitComment()">Comment</button>
                    </div>

                    <!-- Comments List -->
                    <div class="comments-list" id="commentsList">
                        <!-- Comments will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
